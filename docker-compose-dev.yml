  version: "3.9"
  
  services:
    db:
      image: postgres:16-alpine
      restart: always
      container_name: bars_db
      environment:
        POSTGRES_PASSWORD: bars12345
        POSTGRES_DB: BarsSupportDb
        POSTGRES_USER: bars
  
      ports:
        - '5432:5432'
  
      volumes:
        - pgdata:/var/lib/postgresql/data
      networks:
        - backend
    redis:
      image: redis:alpine
      container_name: bars_redis
      restart: always
      ports:
        - '6379:6379'
      command: redis-server --save 60 1 --loglevel warning
      volumes:
        - redisdata:/data
      networks:
        - backend
    minio-s3:
      image: minio/minio
      container_name: minio-s3
      hostname: minio-s3
      restart: always
      ports:
        - "9000:9000"
        - "9001:9001"
      volumes:
        - ./storage:/data
      environment:
        MINIO_ROOT_USER: minio_access_key
        MINIO_ROOT_PASSWORD: minio_secret_key
      command: server /data --console-address ":9001"      
    
  
  
  networks:
    backend:
      driver: bridge
  
  
  volumes:
    pgdata:
    redisdata: